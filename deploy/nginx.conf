server {
    listen 80;
    server_name qsearch.pro www.qsearch.pro;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl;
    server_name qsearch.pro www.qsearch.pro;
    ssl_certificate /etc/ssl/qsearch.pro.pem;
    ssl_certificate_key /etc/ssl/qsearch.pro.key;

    # Bump timeout for SearXNG aggregation and corpus lookups.
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_connect_timeout 60s;

    # MCP-over-HTTP endpoint (Streamable HTTP transport, listens on :8081).
    location /mcp {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        # MCP uses SSE for streaming responses — disable buffering
        proxy_buffering off;
        proxy_cache off;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}
