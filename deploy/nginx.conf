server {
    listen 80;
    server_name qsearch.pro www.qsearch.pro;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl;
    server_name qsearch.pro www.qsearch.pro;
    ssl_certificate /etc/ssl/qsearch.pro.pem;
    ssl_certificate_key /etc/ssl/qsearch.pro.key;

    # qsearch cleaning is CPU-bound on this VPS (no GPU):
    # Qwen3-0.6B Q4 cleaning ~30-60s per result. On mobile with QVAC
    # hardware acceleration it's 10-20x faster. Nginx default 60s
    # proxy_read_timeout truncated every real query with 504 — bumped
    # to 300s to match actual cleaning latency on this hardware.
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_connect_timeout 60s;

    # MCP-over-HTTP endpoint for QVAC Workbench Custom Integration,
    # Claude Desktop (HTTP mode), OpenClaw, etc. Streamable HTTP transport
    # from @modelcontextprotocol/sdk listens on :8081.
    location /mcp {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        # MCP uses SSE for streaming responses — disable buffering
        proxy_buffering off;
        proxy_cache off;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}
