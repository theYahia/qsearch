services:
  meilisearch:
    image: getmeili/meilisearch:v1.7
    ports: ["7700:7700"]
    environment:
      MEILI_MASTER_KEY: masterKey
    volumes:
      - ./data/meili:/meili_data
  qdrant:
    image: qdrant/qdrant:v1.17.1
    ports: ["6333:6333"]
    volumes:
      - ./data/qdrant:/qdrant/storage
  searxng:
    image: searxng/searxng:latest
    ports: ["8888:8080"]
    volumes:
      - ./data/searxng:/etc/searxng
    environment:
      SEARXNG_BASE_URL: "http://localhost:8888/"
  # llama.cpp embedding server — optional, needed for vector search
  # Setup: download Qwen3-Embedding-0.6B-GGUF from HuggingFace, place in ./data/models/
  # Then add LLAMACPP_URL=http://localhost:8899 to .env.local
