services:
  meilisearch:
    image: getmeili/meilisearch:v1.7
    ports: ["7700:7700"]
    environment:
      MEILI_MASTER_KEY: masterKey
    volumes:
      - ./data/meili:/meili_data
  qdrant:
    image: qdrant/qdrant:v1.17.1
    ports: ["6333:6333"]
    volumes:
      - ./data/qdrant:/qdrant/storage
  searxng:
    image: searxng/searxng:latest
    ports: ["8888:8888"]
    profiles: ["full"]
