<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>qsearch — corpus viewer</title>
  <style>
    body { font-family: ui-monospace, monospace; max-width: 1100px; margin: 0 auto; padding: 1rem; background: #0d1117; color: #c9d1d9; }
    header { padding: 0.5rem 0; border-bottom: 1px solid #30363d; }
    h1 { margin: 0; }
    input[type=search], input[type=number] { background: #161b22; color: #c9d1d9; border: 1px solid #30363d; border-radius: 4px; }
    input[type=search] { width: 100%; padding: 0.5rem; }
    .controls { display: flex; gap: 1rem; margin: 1rem 0; align-items: center; }
    .controls label { white-space: nowrap; }
    .url-card { padding: 0.75rem; border: 1px solid #30363d; border-radius: 4px; margin-bottom: 0.5rem; background: #161b22; }
    .url-card .title { font-weight: bold; color: #58a6ff; cursor: pointer; }
    .url-card .url { font-size: 0.85em; color: #8b949e; word-break: break-all; }
    .url-card .meta { font-size: 0.8em; color: #8b949e; margin-top: 0.25rem; }
    .modal { display: none; position: fixed; top: 5%; left: 50%; transform: translateX(-50%); width: 80vw; max-height: 85vh; overflow-y: auto; background: #161b22; border: 1px solid #30363d; padding: 1.5rem; border-radius: 8px; z-index: 100; }
    .modal.show { display: block; }
    .backdrop { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 99; }
    .backdrop.show { display: block; }
    .close { float: right; cursor: pointer; font-size: 1.5em; }
    .badge { display: inline-block; background: #1f6feb; color: white; padding: 0.1rem 0.4rem; border-radius: 4px; font-size: 0.75em; margin-right: 0.25rem; }
    .badge.high { background: #2ea043; }
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; margin: 1rem 0; }
    .stat { padding: 0.75rem; background: #161b22; border: 1px solid #30363d; border-radius: 4px; text-align: center; }
    .stat .num { font-size: 1.5em; font-weight: bold; color: #58a6ff; }
    .stat .label { font-size: 0.8em; color: #8b949e; }
    button { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; border-radius: 4px; padding: 0.4rem 0.8rem; cursor: pointer; }
    button:hover { background: #30363d; }
    a { color: #58a6ff; }
  </style>
</head>
<body>
  <header><h1>qsearch corpus viewer</h1></header>

  <div class="stats" id="stats">
    <div class="stat"><div class="num" id="statTotal">-</div><div class="label">Documents</div></div>
    <div class="stat"><div class="num" id="statHighTrust">-</div><div class="label">engine_count ≥ 3</div></div>
    <div class="stat"><div class="num" id="statRatio">-</div><div class="label">% high-trust</div></div>
    <div class="stat"><div class="num" id="statSizeMb">-</div><div class="label">Size (MB)</div></div>
  </div>

  <div class="controls">
    <input type="search" id="searchBox" placeholder="Search corpus..." />
    <label>Min engines: <input type="number" id="minEngines" value="1" min="1" max="10" style="width: 4rem"></label>
    <label>Limit: <input type="number" id="limitInput" value="20" min="5" max="100" style="width: 4rem"></label>
    <button id="refresh">Refresh</button>
  </div>

  <div id="results"></div>

  <div class="backdrop" id="backdrop"></div>
  <div class="modal" id="modal">
    <span class="close" onclick="closeModal()">&#x2715;</span>
    <div id="modalContent"></div>
  </div>

  <script src="/ui/app.js"></script>
</body>
</html>
